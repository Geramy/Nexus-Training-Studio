# mlx_lm.lora config — research-backed defaults for a tool-calling hybrid MoE.
# Run with:  python -m mlx_lm lora --config py/lora_config.yaml
# (the Flutter app fills {base_model}; training on the 8-bit base auto-uses QLoRA.)
#
# Sources: Thinking Machines "LoRA Without Regret", QLoRA paper, Biderman et al.
# "LoRA Learns Less and Forgets Less" (see docs/research-finetuning-methodology.md).

model: "{base_model}"
train: true
data: "workspace/data"          # train.jsonl + valid.jsonl (messages + tools format)
adapter_path: "workspace/adapters"

# ── Schedule ────────────────────────────────────────────────────────────────
# Forgetting rises with BOTH trainable params and update steps (shifted power
# law), so keep epochs modest and WATCH val loss — stop when it turns up.
# ~iters ≈ epochs * (num_train_examples / batch_size). Tune to your dataset:
# 50 examples → ~150 iters is ~3 epochs. Raise as the corpus grows.
iters: 2000
batch_size: 1
max_seq_length: 8192            # tool prompt ≈4k; raise toward 65536 for long traces
grad_checkpoint: true           # trade compute for memory (fits a 30B on unified RAM)

# LoRA LR ≈ 10x a full-FT LR and is ~rank-independent (Thinking Machines). Sweep
# 5e-5 … 2e-4. Cosine decay over the FULL run (decay_steps == iters) with a short
# warmup. With the large diverse corpus, 2000 iters sees ~2000 unique examples;
# watch val loss and pick the best checkpoint rather than over-train.
learning_rate: 1.0e-4
lr_schedule:
  name: cosine_decay
  warmup: 50
  warmup_init: 1.0e-7
  arguments: [1.0e-4, 2000, 1.0e-6]   # [peak_lr, decay_steps(=iters), end_lr]

steps_per_report: 10
steps_per_eval: 50              # read train-vs-val loss often to catch overfitting
save_every: 50                 # keep checkpoints so we can pick the best val one

# Adapt the last N blocks. mlx-lm's default is 16; more layers learn more but
# forget more. 16 is a balanced start for a 30B.
num_layers: 16

lora_parameters:
  rank: 16
  scale: 32                     # alpha = 2 * rank (standard convention)
  dropout: 0.05
  # Target ATTENTION **and the always-on FFN** — attention-only badly under-
  # performs full FT on MoE models. Keys are matched as substrings, so they are
  # PRECISE on purpose: this model has 128 ROUTED experts per MoE layer
  # (backbone.layers.N.mixer.experts.N.{down,up}_proj — 2944 tensors). A bare
  # "down_proj" would adapt ALL of them → param blow-up + heavy forgetting, so we
  # adapt only `shared_experts` (the always-active FFN every token sees).
  # Verified names via the safetensors index:
  #   6 attention layers:  mixer.{q,k,v,o}_proj
  #   23 Mamba/MoE layers: mixer.{in,out}_proj  +  mixer.shared_experts.{down,up}_proj
  keys:
    - "mixer.q_proj"
    - "mixer.k_proj"
    - "mixer.v_proj"
    - "mixer.o_proj"
    - "mixer.in_proj"
    - "mixer.out_proj"
    - "shared_experts.down_proj"
    - "shared_experts.up_proj"
