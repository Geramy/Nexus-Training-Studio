# mlx_lm.lora config — ADDITIVE recovery pass (run-6), resuming from the run-4
# final adapter. Restore py/lora_config.run4.yaml.bak for a full retrain;
# run-5's config is preserved in workspace/adapters.run5/lora_config.run5.yaml.
#
# Corpus: workspace/data = 8k NEW recovery examples (short/split openers +
# features_done contrast — fixes run-5's greedy repetition collapse in the
# opening propose_tags and the #1/#3 features re-ask) + 8k REPLAY sampled
# from the run-4 corpus. Replay + low LR is what prevents forgetting while the
# new shapes imprint (Biderman et al.; docs/research-finetuning-methodology.md).

model: "{base_model}"
train: true
data: "workspace/data"          # train.jsonl + valid.jsonl (messages + tools format)
adapter_path: "workspace/adapters"

# CONTINUE from the run-4 end-of-training weights (the shipped-candidate
# adapter, backed up verbatim in adapters.run4) instead of fresh LoRA init.
resume_adapter_file: "workspace/adapters.run4/adapters.safetensors"

# Completion-only loss — same rationale as the full run (see run4 backup).
mask_prompt: true

# ── Schedule ────────────────────────────────────────────────────────────────
# Run-7: BACK to run-5's proven 1500 iters. Run-6 (800 iters) showed the
# collapse was a DATA problem (fixed by the short/split openers — 0 runaways)
# while the recovery discipline genuinely needs ~1500 iters to imprint
# (12/27 at 800: thirteen cases ground the finalize gate instead of
# recovering). Same schedule as run-5, collapse-free corpus.
iters: 1500
batch_size: 1
max_seq_length: 8192
grad_checkpoint: true

# LR ~7x lower than the run-4 peak (1e-4): we are refining a settled policy,
# not learning from scratch — low LR + replay is the anti-forgetting recipe.
# Cosine to the same 1e-6 floor so the pass ends with settled weights.
learning_rate: 1.5e-5
lr_schedule:
  name: cosine_decay
  warmup: 30
  warmup_init: 1.0e-7
  arguments: [1.5e-5, 1500, 1.0e-6]   # [peak_lr, decay_steps(=iters), end_lr]

steps_per_report: 10
steps_per_eval: 100             # val loss = "didn't diverge" sanity check ONLY
save_every: 100                 # numbered checkpoints are never shipped

# Must match the run-4 adapter exactly (same layers/rank/keys) so the resumed
# weights load 1:1.
num_layers: 16

lora_parameters:
  rank: 16
  scale: 32
  dropout: 0.05
  keys:
    - "mixer.q_proj"
    - "mixer.k_proj"
    - "mixer.v_proj"
    - "mixer.o_proj"
    - "mixer.in_proj"
    - "mixer.out_proj"
    - "shared_experts.down_proj"
    - "shared_experts.up_proj"
